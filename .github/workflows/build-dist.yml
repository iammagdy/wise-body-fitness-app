name: Build dist for Hostinger

# Runs on every push to main AND can be triggered manually from the
# Actions tab. The output is a downloadable zip ("wise-body-dist") that
# you upload into your Hostinger public_html folder.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "artifacts/fitvision/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/build-dist.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build static bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Wise Body PWA
        env:
          # The Vite config requires these at build time. PORT is only
          # used by the dev server, so any value works for production.
          # BASE_PATH=/ deploys to the site root (Hostinger public_html).
          PORT: "3000"
          BASE_PATH: "/"
        run: pnpm --filter @workspace/fitvision run build

      - name: Add .htaccess for SPA routing on Apache (Hostinger)
        run: |
          cat > artifacts/fitvision/dist/public/.htaccess <<'HTACCESS'
          # SPA fallback — every unknown path serves index.html so the
          # client-side router can take over.
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>

          # Long-cache hashed assets, never cache the HTML shell.
          <IfModule mod_headers.c>
            <FilesMatch "\.(?:js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|webp|avif|svg|ico)$">
              Header set Cache-Control "public, max-age=31536000, immutable"
            </FilesMatch>
            <FilesMatch "\.(?:html|json|webmanifest)$">
              Header set Cache-Control "no-cache, no-store, must-revalidate"
            </FilesMatch>
          </IfModule>

          # Gzip / Brotli compression
          <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/html text/css text/javascript application/javascript application/json image/svg+xml
          </IfModule>

          # Service worker must always be revalidated
          <Files "service-worker.js">
            Header set Cache-Control "no-cache, no-store, must-revalidate"
          </Files>
          HTACCESS

      - name: Upload build as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: wise-body-dist
          path: artifacts/fitvision/dist/public/
          if-no-files-found: error
          retention-days: 30
          include-hidden-files: true
