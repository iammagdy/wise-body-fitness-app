name: Build & publish to deploy branch

# What this does:
#   1. Builds the Wise Body PWA from source on `main`.
#   2. Force-pushes the built static files (the contents of
#      `artifacts/fitvision/dist/public/`) as the root of a separate
#      branch called `deploy`.
#   3. On Hostinger, point the Git tool at this repo and choose the
#      `deploy` branch — every "Deploy" click runs `git pull` and the
#      already-built files land directly into public_html. No build
#      step required on the host.
#
# Triggers:
#   - workflow_dispatch  → manual button in the Actions tab
#   - push to main       → automatic on any source change
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "artifacts/fitvision/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/build-dist.yml"

permissions:
  contents: write

concurrency:
  group: deploy-branch
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Build & publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        # Not using --frozen-lockfile because the workspace overrides
        # config currently differs slightly from what's recorded in
        # pnpm-lock.yaml. CI just resolves a fresh lockfile in-memory.
        run: pnpm install --no-frozen-lockfile

      - name: Build Wise Body PWA
        env:
          # PORT is required by vite.config.ts but only used by the dev
          # server, so any value works for production builds.
          # BASE_PATH=/ deploys to the site root (Hostinger public_html).
          PORT: "3000"
          BASE_PATH: "/"
        run: pnpm --filter @workspace/fitvision run build

      - name: Add .htaccess (SPA routing + caching for Apache/Hostinger)
        run: |
          cat > artifacts/fitvision/dist/public/.htaccess <<'HTACCESS'
          # SPA fallback — every unknown path serves index.html so the
          # client-side router can take over.
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>

          # Long-cache hashed assets, never cache the HTML shell.
          <IfModule mod_headers.c>
            <FilesMatch "\.(?:js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|webp|avif|svg|ico)$">
              Header set Cache-Control "public, max-age=31536000, immutable"
            </FilesMatch>
            <FilesMatch "\.(?:html|json|webmanifest)$">
              Header set Cache-Control "no-cache, no-store, must-revalidate"
            </FilesMatch>
          </IfModule>

          # Gzip compression
          <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/html text/css text/javascript application/javascript application/json image/svg+xml
          </IfModule>

          # Service worker must always be revalidated
          <Files "service-worker.js">
            Header set Cache-Control "no-cache, no-store, must-revalidate"
          </Files>
          HTACCESS

      - name: Write a small README into the deploy branch
        run: |
          cat > artifacts/fitvision/dist/public/DEPLOY_README.md <<'MD'
          # Wise Body — built artifacts

          This branch is **auto-generated** by GitHub Actions from `main`.
          Do not commit to it directly — your changes will be overwritten
          on the next build. Edit source on `main` instead.

          Hostinger Git tool should point at:
          - Repository: this repo
          - Branch: `deploy`

          Every "Deploy" click runs `git pull` and serves these files
          directly from `public_html/`.
          MD

      - name: Publish to deploy branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SRC_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          cd artifacts/fitvision/dist/public

          git init -q -b deploy
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -q -m "Deploy build from ${SRC_SHA::7} (by ${ACTOR})"

          git push --force --quiet \
            "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" \
            HEAD:deploy

          echo "✅ Pushed build to deploy branch"
          echo "   On Hostinger: Git → Pull/Deploy on branch 'deploy'"
