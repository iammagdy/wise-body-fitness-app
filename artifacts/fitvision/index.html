<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Wise Body : Fitness App</title>
    <meta name="description" content="Home workouts, recovery and breathing sessions — part of The Wise Cloud (fitness.thewise.cloud)." />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#1c1917" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wise Body" />
    <meta property="og:title" content="Wise Body : Fitness App" />
    <meta property="og:description" content="Home workouts, recovery and breathing — part of The Wise Cloud." />
    <meta property="og:image" content="./opengraph.jpg" />
    <meta property="og:image:alt" content="Wise Body — fitness app, part of The Wise Cloud" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fitness.thewise.cloud" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      (function () {
        try {
          var p = localStorage.getItem('fitvision.theme') || 'system';
          var dark =
            p === 'dark' ||
            (p === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', dark ? '#0c0a09' : '#fafaf9');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
